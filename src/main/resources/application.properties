spring.application.name=seatmanager

spring.datasource.url=jdbc:mysql:///seatmanager_db?cloudSqlInstance=project-9be24dba-ca07-4283-981:us-central1:my-seatmanager-instance&socketFactory=com.google.cloud.sql.mysql.SocketFactory
spring.datasource.username=appuser
spring.datasource.password=appuser
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
server.servlet.session.cookie.same-site=None
server.servlet.session.cookie.secure=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.port=${PORT:8080}
